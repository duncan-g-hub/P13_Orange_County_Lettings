name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}

    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run flake8
        run: |
          python -m flake8 .

      - name: Run tests with coverage
        run: |
          python -m pytest --cov=. --cov-fail-under=80
          

  docker:
    needs: test
    if: github.ref == 'refs/heads/master'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      - name: Build Docker image
        run: |
          docker build \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/oc-lettings:${{ github.sha }} \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/oc-lettings:latest .


      - name: Push Docker image SHA
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/oc-lettings:${{ github.sha }}

      - name: Push Docker image latest
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/oc-lettings:latest